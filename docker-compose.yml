services:
  scr-web:
    build: .
    container_name: scr-web
    env_file:
      - .env
    environment:
      SERPER_MONTHLY_LIMIT: ${SERPER_MONTHLY_LIMIT:-2500}
      SERPER_REQUESTS_PER_SECOND: ${SERPER_REQUESTS_PER_SECOND:-2}
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
